<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Title</title>
  </head>
  <body>
    <h1>Hello World..!</h1>
    <script>
      alert('Hello Javascript...!');
    </script>
    <!--
        <script> 태그 위치에 따른 차이
            1. head에 작성 -> html 파싱 전 스크립트 실행, DOM 요소 조작은 어려움
            2. body에 작성 -> html 파싱 후 스크립트 실행, DOM 요소 조작은 가능
    -->
  </body>
</html>
