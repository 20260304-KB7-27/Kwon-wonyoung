<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>회원가입</legend>
        <table>
          <tr>
            <td><label for="userid">사용자 ID</label></td>
            <td><input id="userid" type="text" name="userid"/></td>
          </tr>
          <tr>
            <td><label for="pwd">비밀번호</label></td>
            <td><input id="pwd" type="password" name="pwd" /></td>
          </tr>
          <tr>
            <td><label for="pwd2">비밀번호 확인</label></td>
            <td><input id="pwd2" type="password" name="pwd2"/></td>
          </tr>
          <tr>
            <td><label for="name">이름</label></td>
            <td><input id="name" type="text" name="name" /></td>
          </tr>
          <tr>
            <td><label for="gender">성별</label></td>
            <td>
              <input id="man" type="radio" name="gender" value="m" />
              <label for="man">남</label>
              <input id="woman" type="radio" name="gender" value="w" />
              <label for="woman">여</label>
            </td>
          </tr>
          <tr>
            <td>
              <label for="hobby">취미</label>
            </td>
            <td>
              <input id="soccer" type="radio" name="hobby" value="s" />
              <label for="soccer">축구</label>
              <input id="baseball" type="radio" name="hobby" value="bs" />
              <label for="baseball">야구</label>
              <input id="volleyball" type="radio" name="hobby" value="v" />
              <label for="volleyball">배구</label>
              <input id="basketball" type="radio" name="hobby" value="bk" />
              <label for="basketball">농구</label>
            </td>
          </tr>
          <tr>
            <td><label for="mail">이메일</label></td>
            <td><input id="mail" name="email" type="email" /></td>
          </tr>
          <tr>
            <td><label for="role">역할</label></td>
            <td>
              <select name="role" id="role">
                <option>ADMIN</option>
                <option>관리자</option>
                <option>일반회원</option>
              </select>
            </td>
          </tr>
        </table>
        <input type="submit" value="확인" />
        <input type="button" value="다시쓰기" />
      </fieldset>
    </form>
  </body>
</html>
