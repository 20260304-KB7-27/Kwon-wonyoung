<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      h1 {
        background-color: orange;
        color: aquamarine;
      }
    </style>
  </head>
  <body>
    <!--
    CSS
    - Cascading, 상속, 재사용성

    1. 외부 스타일 시트 (.css)
    2. 내부 스타일 시트 (<style></style>)
    3. 인라인 스타일 (요소)

    선택자:  id / Class / tag / * / atrribute
    
    우선순위: !important > 인라인 스타일 > id > class > tag > * > 상속된 스타일
    -->
    <h1 style="color: blue">CSS 선택자 기본</h1>
  </body>
</html>
