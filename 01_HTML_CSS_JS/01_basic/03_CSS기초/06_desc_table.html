<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <!-- tbody 태그는 생략되어 있으니깐 style에서 적어준다.-->
    <style>
      table > tbody > tr > th {
        color: red;
      }
    </style>
  </head>
  <body>
    <table>
      <tr>
        <th>이름</th>
        <th>지역</th>
      </tr>
      <tr>
        <td>권원영</td>
        <td>서울 강서구</td>
      </tr>
    </table>
  </body>
</html>
