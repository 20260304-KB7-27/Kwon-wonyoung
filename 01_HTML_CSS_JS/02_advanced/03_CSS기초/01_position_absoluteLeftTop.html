<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .parent {
        width: 300px;
        height: 300px;
        background-color: aliceblue;
        position: relative;
      }

      .box {
        width: 100px;
        height: 100px;
        position: absolute;
      }
      /*
        nth-child: 가상 클래스 선택자
        - 특정 순서의 자식 요소 선택
        */
      .box:nth-child(1) {
        background-color: red;
        left: 10px;
        top: 10px;
      }
      .box:nth-child(2) {
        background-color: green;
        left: 50px;
        top: 50px;
      }
      .box:nth-child(3) {
        background-color: blue;
        left: 90px;
        top: 90px;
      }
    </style>
  </head>
  <!--
  absolute: 부모 요소를 기준으로 위치를 지정-->
  <body>
    <h1>테스트</h1>
    <div class="parent">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
  </body>
</html>
