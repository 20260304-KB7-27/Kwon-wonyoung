<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <h1>반사신경 테스트</h1>
      <button :style="buttonStyle">
        {{true ? "대기" : "지금"}}
      </button>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const style1 = {};

          const buttonStyle = {
            width: '400px',
            height: '200px',
            backgroundColor: 'red',
            color: 'white',
            fontSize: '100px',
          };

          const gameStart = ref(false);
          
          return {
            style1,
            buttonStyle,
            gameStart,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
