<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <!--
      template
      -> 뷰 컴포넌트의 구조를 정의하는 공간
      -> 실제 HTML 요소를 만들지 않고 묶고 싶을 때 사용
      -->
      <template v-if="isLogin">
        <p>환영합니다 {{ username }} 님</p>
        <button @click="logout">로그아웃</button>
      </template>

      <template v-else>
        <p>로그인을 하쇼</p>
        <button @click="login">로그인</button>
      </template>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const username = ref('권원영');
          const isLogin = ref(false);

          function login() {
            isLogin.value = true;
          }

          function logout() {
            isLogin.value = false;
          }

          return {
            username,
            isLogin,
            login,
            logout,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
