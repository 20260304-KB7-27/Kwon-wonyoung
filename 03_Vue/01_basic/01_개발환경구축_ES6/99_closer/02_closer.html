<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>클로저 예제</title>
  </head>
  <body>
    <h1>클로저를 이용한 클릭 카운터</h1>
    <button id="btn">클릭</button>
    <p id="text">버튼을 눌러보세요.</p>

    <script>
      function createClickHandler() {

        // 클로저를 사용했을 때의 장점
        // 의도치 않게 다른 함수 코드에서 특정 변수가 사용될 가능성이 사라짐.
        let count = 0;

        return {
            increase: function () {
                count++;
            },
            decrease: function () {
                count--;
            },
            resetcrease: function () {
                count = 0;
            }
        }
        // function () {
        //   count++;
        //   document.getElementById('text').textContent =
        //     `버튼을 ${count}번 클릭했습니다.`;
        // };
      }

      const button = document.getElementById('btn');

      button.addEventListener('click', createClickHandler());
    </script>
  </body>
</html>
