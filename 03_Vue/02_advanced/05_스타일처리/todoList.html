<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family: sans-serif;
      }
      .title {
        text-align: center;
        font-weight: bold;
        font-style: 20pt;
      }
      .todo-done {
        text-decoration: line-through;
      }
      .container {
        padding: 10px;
      }
      .panel-borderless {
        border: 0;
        box-shadow: none;
      }
      .pointer {
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div id="app" class="container">
      <div class="card card-body bg-light">
        <div class="title">:: Todolist App</div>
      </div>
      <div class="card card-default card-borderless">
        <div class="card-body">
          <div class="row mb-3">
            <div class="input-group">
              <input
                id="msg"
                type="text"
                name="msg"
                placeholder="할 일을 여기에 입력!"
                class="form-control"
                v-model.trim="todo"
                @keyup.enter="addTodo"
                @keyup.ctrl.enter="addTodo"
              />
              <span @click="addTodo" class="btn btn-primary input-group-addon"
                >추가</span
              >
            </div>
          </div>
          <div class="row">
            <div class="col">
              <ul class="list-group">
                <li
                  v-for="todoitem in todoList"
                  :key="todoitem.id"
                  class="list-group-item"
                  :class="{ 'list-group-item-success': todoitem.completed }"
                  @click="toggleCompleted(todoitem.id)"
                >
                  <span
                    class="pointer"
                    :class="{ 'todo-done': todoitem.completed}"
                    >{{todoitem.todo}} {{todoitem.completed ? "(완료)":
                    ""}}</span
                  >
                  <span
                    class="float-end badge bg-secondary pointer"
                    @click.stop="deleteTodo(todoitem.id)"
                    >삭제</span
                  >
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const { createApp, ref } = Vue;

      createApp({
        setup() {
          const ts = ref(new Date().getTime());
          const todo = ref('');
          const todoList = ref([
            { id: ts, todo: '자전거 타기', completed: false },
            { id: ts + 1, todo: '딸과 공원 산책', completed: true },
            { id: ts + 2, todo: '일요일 애견 카페', completed: false },
            { id: ts + 3, todo: 'Vue 원고 집필', completed: false },
          ]);

          const addTodo = (e) => {
            if (todo.value === '') return;

            todoList.value.push({
              id: new Date().getTime(),
              todo: todo.value,
              completed: e.ctrlKey ? true : false,
            });

            todo.value = '';
          };

          const deleteTodo = (id) => {
            let index = todoList.value.findIndex((item) => id === item.id);
            todoList.value.splice(index, 1);
          };

          const toggleCompleted = (id) => {
            let index = todoList.value.findIndex((item) => id === item.id);
            todoList.value[index].completed = !todoList.value[index].completed;
          };

          return {
            todo,
            todoList,
            addTodo,
            deleteTodo,
            toggleCompleted,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
