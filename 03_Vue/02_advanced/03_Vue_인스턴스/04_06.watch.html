<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <input v-model.lazy="name" placeholder="이름!" />
      <br />
      <input v-model.lazy="user.age" placeholder="나이!" />
      <br />
      <input v-model.lazy="user.email" placeholder="이메일!" />
      <br />
    </div>

    <script>
      const { createApp, ref, watch } = Vue;

      createApp({
        setup() {
          const name = ref('');
          const user = ref({
            age: 0,
            email: '',
          });

          // watch
          // 반응형 데이터가 변경될 때 실행
          // return은 없고 데이터 변경에 따른 부가적인 작업을 할 때 사용(알림, 로깅)

          watch(name, (newVal, oldVal) => {
            console.log(`이름이 ${oldVal}에서 ${newVal}로 변경됨.`);
          });

          // 객체를 deep을 사용해서 감시할 경우, 동일한 proxy를 참조함.
          watch(
            () => ({...user.value}),
            (newVal, oldVal) => {
              console.log(
                `기존 사용자:  ${oldVal.age}, ${oldVal.email}  -> 변경된 사용자: ${newVal.age}, ${newVal.email}`,
              );
            },
            {
              deep: true, // 객체 내부 속성까지 감시
            },
          );

          return {
            name,
            user,
          };
        },
      }).mount('#app');
    </script>
  </body>
</html>
