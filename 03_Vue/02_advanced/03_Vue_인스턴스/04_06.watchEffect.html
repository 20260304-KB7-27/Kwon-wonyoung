<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <input v-model.lazy="name" placeholder="이름!" />
      <br />
      <input v-model.lazy="user.age" placeholder="나이!" />
      <br />
      <input v-model.lazy="user.email" placeholder="이메일!" />
      <br />
    </div>

    <script>
      const { createApp, ref, watchEffect } = Vue;

      createApp({
        setup() {
          const name = ref('');
          const user = ref({
            age: 0,
            email: '',
          });
          watchEffect(() => {
            // 콜백함수에서 사용된 반응형 데이터를 자동으로 추적
            // 변경될 경우 콜백함수 실행
            console.log(`이름이 ${name.value}로 변경됨`);
          });
          return { name, user };
        },
      }).mount('#app');
    </script>
  </body>
</html>
