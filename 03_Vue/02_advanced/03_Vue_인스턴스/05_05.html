<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vue 3 연습용 Composition</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <div @contextmenu.prevent="ctxStop"
        style="position: absolute; left: 5px; top: 5px; right: 5px; bottom: 5px;"
      >
        <a href="https://facebook.com" @click="confirmFB">페이스북</a>
      </div>
    </div>

    <script>
      const { createApp } = Vue;

      createApp({
        setup() {
          const confirmFB = (e) => {
            if(!confirm("페이스북으로 이동할까요?")){
              e.preventDefault();
            }
          };

          const ctxStop = (e) => {
            e.preventDefault();
          };

          return { confirmFB, ctxStop };
        },
      }).mount('#app');
    </script>
  </body>
</html>
